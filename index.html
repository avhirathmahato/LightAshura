<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightAshuraa | Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }

        /* Full-screen video setup */
        .v-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .v-bg iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Darkening and Blur Layer */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        /* CSS-only yellow sparks (Can't break!) */
        .spark {
            position: absolute;
            background: #fffb00;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #ffee00, 0 0 20px #ffcc00;
            animation: moveUp 10s infinite linear;
            opacity: 0;
        }

        @keyframes moveUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            30% { opacity: 0.8; }
            70% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .ui-center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* Glowing YouTube Button */
        .btn-yt {
            padding: 22px 55px;
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            text-decoration: none;
            background: #ff0000;
            border-radius: 60px;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            transition: 0.4s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .btn-yt:hover {
            transform: scale(1.1);
            background: #ff2b2b;
            box-shadow: 0 0 60px #ff0000;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

    <div class="v-bg">
        <iframe 
            src="https://www.youtube.com/embed/qZoLkv74fM0?autoplay=1&mute=1&loop=1&playlist=qZoLkv74fM0&controls=0&modestbranding=1&rel=0" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <div class="overlay"></div>

    <div class="ui-center">
        <a href="https://www.youtube.com/@LIghtAshuraa" target="_blank" class="btn-yt">
            Subscribe
        </a>
    </div>

    <script>
        // Create the sparks via JavaScript
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'spark';
            const size = Math.random() * 5 + 2 + 'px';
            s.style.width = size;
            s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = Math.random() * 6 + 4 + 's';
            s.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
