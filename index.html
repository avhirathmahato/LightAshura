<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightAshuraa | Blox Fruits Edit</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Video Background Container */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        /* The Blur Overlay */
        .video-blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Darkens the video slightly */
            backdrop-filter: blur(8px); /* The Blur Effect */
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Floating Fruits Layer */
        #fruit-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .floating-fruit {
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.5;
            transition: opacity 0.4s ease, transform 0.1s linear;
        }

        .floating-fruit.active {
            opacity: 1;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            transform: scale(1.3) !important;
        }

        /* The Glowing Button */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .yt-glow-button {
            padding: 22px 45px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #ff0000;
            border-radius: 60px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
        }

        .yt-glow-button:hover {
            letter-spacing: 4px;
            box-shadow: 0 0 50px #ff0000;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/qZoLkv74fM0?autoplay=1&mute=1&controls=0&loop=1&playlist=qZoLkv74fM0&showinfo=0&rel=0" 
                frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
    
    <div class="video-blur-overlay"></div>

    <div id="fruit-background"></div>

    <div class="content-wrapper">
        <a href="https://www.youtube.com/@LIghtAshuraa" target="_blank" class="yt-glow-button">
            <span>▶</span> Subscribe to LightAshuraa
        </a>
    </div>

    <script>
        const fruitImages = [
            'https://static.wikia.nocookie.net/blox-fruits/images/d/df/Light_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/1/1d/T-Rex_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/3/3d/Kitsune_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/1/10/Dragon_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/2/2a/Control_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/1/15/Gravity_Fruit_Icon.png'
        ];

        const container = document.getElementById('fruit-background');
        const fruitNodes = [];

        fruitImages.forEach(src => {
            const img = document.createElement('div');
            img.className = 'floating-fruit';
            img.style.backgroundImage = `url('${src}')`;
            img.style.left = Math.random() * 80 + 10 + 'vw';
            img.style.top = Math.random() * 80 + 10 + 'vh';
            img.dataset.depth = Math.random() * 0.2 + 0.05;
            container.appendChild(img);
            fruitNodes.push(img);
        });

        document.addEventListener('mousemove', (e) => {
            const { clientX: x, clientY: y } = e;
            fruitNodes.forEach(fruit => {
                const depth = parseFloat(fruit.dataset.depth);
                const moveX = (window.innerWidth / 2 - x) * depth / 4;
                const moveY = (window.innerHeight / 2 - y) * depth / 4;
                fruit.style.transform = `translate(${moveX}px, ${moveY}px)`;

                const rect = fruit.getBoundingClientRect();
                const fx = rect.left + rect.width / 2;
                const fy = rect.top + rect.height / 2;
                const dist = Math.sqrt(Math.pow(x - fx, 2) + Math.pow(y - fy, 2));

                if (dist < 150) fruit.classList.add('active');
                else fruit.classList.remove('active');
            });
        });
    </script>
</body>
</html>
