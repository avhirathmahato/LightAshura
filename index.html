<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightAshuraa | Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Video Background Fix */
        .v-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .v-container iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Blur & Darken Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(6px); /* Adjusted blur for better visibility */
            -webkit-backdrop-filter: blur(6px);
            z-index: -1;
        }

        /* Yellow "Light Fruit" Particles */
        .particle {
            position: absolute;
            background: #fff700;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            filter: blur(1px) drop-shadow(0 0 10px #ffcc00);
            animation: float 15s infinite linear;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Content Area */
        .main-ui {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        .yt-button {
            padding: 20px 45px;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            background: #ff0000;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 0, 0, 0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .yt-button:hover {
            transform: scale(1.1);
            letter-spacing: 5px;
            box-shadow: 0 0 50px #ff0000;
            background: #ff2b2b;
        }
    </style>
</head>
<body>

    <div class="v-container">
        <iframe 
            src="https://www.youtube.com/embed/qZoLkv74fM0?autoplay=1&mute=1&loop=1&playlist=qZoLkv74fM0&controls=0&disablekb=1&modestbranding=1&showinfo=0&rel=0" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <div class="overlay"></div>

    <div class="main-ui">
        <a href="https://www.youtube.com/@LIghtAshuraa" target="_blank" class="yt-button">
            Subscribe Now
        </a>
    </div>

    <script>
        // Generate yellow Light Fruit particles
        const particleCount = 35;
        for (let i = 0; i < particleCount; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            
            // Randomize size and position
            let size = Math.random() * 6 + 2 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            
            // Randomize timing
            p.style.animationDuration = Math.random() * 10 + 10 + 's';
            p.style.animationDelay = Math.random() * 15 + 's';
            
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
