<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightAshuraa | V4 Awakened</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: 'Segoe UI', sans-serif;
        }

        /* Background Video Fix */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Overlay with V4 Glow */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(255, 230, 0, 0.15), rgba(0,0,0,0.4));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
        }

        /* V4 Aura Particles (Floating from bottom) */
        .v4-particle {
            position: absolute;
            bottom: -20px;
            background: #fffb00;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 15px #ffee00, 0 0 30px #ffaa00;
            animation: v4Rise 6s infinite ease-out;
            opacity: 0;
        }

        @keyframes v4Rise {
            0% { transform: translateY(0) scale(0) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            50% { transform: translateY(-50vh) scale(1.2) translateX(20px); }
            80% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(0.5) translateX(-20px); opacity: 0; }
        }

        /* UI Styling */
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        .subscribe-btn {
            padding: 22px 60px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            background: #ff0000;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 4px;
            /* Heavy Neon Glow */
            box-shadow: 0 0 20px #ff0000, 0 0 40px rgba(255, 0, 0, 0.6);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .subscribe-btn:hover {
            transform: scale(1.1) rotate(-1deg);
            background: #ff2b2b;
            box-shadow: 0 0 60px #ff0000, 0 0 100px rgba(255, 255, 255, 0.2);
            letter-spacing: 8px;
        }

        /* Vignette effect to focus on center */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div class="vignette"></div>

    <div class="content">
        <a href="https://www.youtube.com/@LIghtAshuraa" target="_blank" class="subscribe-btn">
            Subscribe
        </a>
    </div>

    <script>
        // V4 Particle Emitter
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'v4-particle';
            
            // Randomize size, position, and speed
            const size = Math.random() * 6 + 3 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            
            // Randomize animation duration for a natural feel
            const duration = Math.random() * 4 + 4 + 's';
            p.style.animationDuration = duration;
            
            document.body.appendChild(p);

            // Remove particle after animation to keep the site fast
            setTimeout(() => {
                p.remove();
            }, duration * 1000);
        }

        // Emit particles every 150ms
        setInterval(createParticle, 150);
    </script>
</body>
</html>
