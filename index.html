<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightAshuraa | Blox Fruits Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        #fruit-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .floating-fruit {
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.4; /* Slightly higher visibility */
            transition: opacity 0.4s ease, transform 0.1s linear, filter 0.4s ease;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .floating-fruit.active {
            opacity: 1;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            transform: scale(1.3) !important; /* Force growth on hover */
        }

        .yt-glow-button {
            position: relative;
            padding: 22px 45px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #ff0000;
            border-radius: 60px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
        }

        .yt-glow-button:hover {
            letter-spacing: 4px;
            background-color: #ff2222;
            box-shadow: 0 0 40px #ff0000, 0 0 80px rgba(255, 0, 0, 0.5);
            transform: scale(1.08);
        }

        .play-icon { font-size: 1.8rem; }
    </style>
</head>
<body>

    <div id="fruit-background"></div>

    <a href="https://www.youtube.com/@LIghtAshuraa" target="_blank" class="yt-glow-button">
        <span class="play-icon">▶</span>
        Subscribe to LightAshuraa
    </a>

    <script>
        // Updated with reliable Wiki Direct Links
        const fruitImages = [
            'https://static.wikia.nocookie.net/blox-fruits/images/d/df/Light_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/1/1d/T-Rex_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/3/3d/Kitsune_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/1/10/Dragon_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/6/60/Tiger_Fruit_Icon.png', // Tiger/Leopard
            'https://static.wikia.nocookie.net/blox-fruits/images/9/90/Yeti_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/2/2a/Control_Fruit_Icon.png',
            'https://static.wikia.nocookie.net/blox-fruits/images/1/15/Gravity_Fruit_Icon.png'
        ];

        const container = document.getElementById('fruit-background');
        const fruitNodes = [];

        // Randomly scatter fruits on load
        fruitImages.forEach(src => {
            const img = document.createElement('div');
            img.className = 'floating-fruit';
            img.style.backgroundImage = `url('${src}')`;
            img.style.left = Math.random() * 80 + 10 + 'vw';
            img.style.top = Math.random() * 80 + 10 + 'vh';
            img.dataset.depth = Math.random() * 0.3 + 0.1;
            container.appendChild(img);
            fruitNodes.push(img);
        });

        // Track Mouse
        document.addEventListener('mousemove', (e) => {
            const { clientX: x, clientY: y } = e;

            fruitNodes.forEach(fruit => {
                const depth = parseFloat(fruit.dataset.depth);
                const moveX = (window.innerWidth / 2 - x) * depth / 5;
                const moveY = (window.innerHeight / 2 - y) * depth / 5;
                
                fruit.style.transform = `translate(${moveX}px, ${moveY}px)`;

                const rect = fruit.getBoundingClientRect();
                const fx = rect.left + rect.width / 2;
                const fy = rect.top + rect.height / 2;
                const dist = Math.sqrt(Math.pow(x - fx, 2) + Math.pow(y - fy, 2));

                // Glow range
                if (dist < 150) {
                    fruit.classList.add('active');
                } else {
                    fruit.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
